<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
let sessoes = [];
let chartMS = null;
let chartLucro = null;
let chartDisc = null;
let soros2Ativo = true;

/* =========================
   STORAGE SEGURO
========================= */
function salvarStorage() {
  localStorage.setItem('sessoes', JSON.stringify(sessoes));
}

function carregarStorage() {
  const r = localStorage.getItem('sessoes');
  sessoes = r ? JSON.parse(r) : [];
}

/* =========================
   HELPERS
========================= */
const fmtM = v => {
  const n = parseFloat(v) || 0;
  return (n < 0 ? '-' : '') + 'R$ ' + Math.abs(n).toFixed(2).replace('.', ',');
};

const fmtD = d => {
  if (!d) return '';
  const p = d.split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
};

/* =========================
   CONTADOR
========================= */
function atualizarContador() {
  const el = document.getElementById('total-sessoes');
  if (el) el.textContent = sessoes.length + ' sessão(ões)';
}

/* =========================
   TAB SYSTEM (SEGURO)
========================= */
function switchTab(id) {
  const tabs = ['registrar', 'dashboard', 'historico'];

  tabs.forEach(t => {
    const sec = document.getElementById('sec-' + t);
    if (sec) sec.classList.remove('active');
  });

  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));

  const idx = tabs.indexOf(id);
  if (idx >= 0 && document.querySelectorAll('.tab')[idx]) {
    document.querySelectorAll('.tab')[idx].classList.add('active');
  }

  const sec = document.getElementById('sec-' + id);
  if (sec) sec.classList.add('active');

  if (id === 'dashboard') renderDashboard();
  if (id === 'historico') renderHistorico();
}

/* =========================
   SOROS
========================= */
function toggleSoros2() {
  soros2Ativo = !soros2Ativo;

  const box = document.getElementById('soros-2-box');
  const btn = document.getElementById('btn-add-soros2');

  if (box) box.style.display = soros2Ativo ? 'block' : 'none';
  if (btn) btn.style.display = soros2Ativo ? 'none' : 'block';
}

/* =========================
   SALVAR
========================= */
function salvarSessao() {
  const data = document.getElementById('inp-data').value;
  if (!data) return alert('Informe a data');

  const lucroRaw = document.getElementById('inp-lucro').value;
  if (lucroRaw === '') return alert('Informe lucro/prejuízo');

  const s = {
    id: Date.now(),
    data,
    periodo: document.getElementById('inp-periodo').value,
    resultado: document.getElementById('inp-resultado').value,
    disciplina: document.getElementById('inp-disciplina').value,
    lucro: parseFloat(lucroRaw) || 0,
    obs: document.getElementById('inp-obs').value || '',

    e1_setup: document.getElementById('e1-setup').value,
    e1_valor: parseFloat(document.getElementById('e1-valor').value) || 0,
    e1_res: document.getElementById('e1-res').value,

    e2_ativo: soros2Ativo,
    e2_setup: soros2Ativo ? document.getElementById('e2-setup').value : null,
    e2_valor: soros2Ativo ? parseFloat(document.getElementById('e2-valor').value) || 0 : null,
    e2_res: soros2Ativo ? document.getElementById('e2-res').value : null,
  };

  sessoes.unshift(s);
  salvarStorage();

  atualizarContador();
  renderDashboard();
  renderHistorico();

  alert('Sessão salva!');
}

/* =========================
   ASSERTIVIDADE
========================= */
function calcAssert(arr) {
  let total = 0;
  let win = 0;

  arr.forEach(s => {
    total++;
    if (s.e1_res === 'win') win++;

    if (s.e2_ativo) {
      total++;
      if (s.e2_res === 'win') win++;
    }
  });

  return {
    total,
    win,
    pct: total ? ((win / total) * 100).toFixed(1) : 0
  };
}

/* =========================
   DASHBOARD
========================= */
function renderDashboard() {
  const total = sessoes.length;
  const metas = sessoes.filter(s => s.resultado === 'meta').length;
  const lucro = sessoes.reduce((a, s) => a + s.lucro, 0);
  const disc = sessoes.filter(s => s.disciplina === 'ok').length;
  const ga = calcAssert(sessoes);

  const dash = document.getElementById('dash-metrics');
  if (dash) {
    dash.innerHTML = `
      <div class="metric"><div class="metric-label">Sessões</div><div class="metric-val">${total}</div></div>
      <div class="metric"><div class="metric-label">Meta</div><div class="metric-val">${total ? ((metas / total) * 100).toFixed(1) : 0}%</div></div>
      <div class="metric"><div class="metric-label">Assertividade</div><div class="metric-val">${ga.pct}%</div></div>
      <div class="metric"><div class="metric-label">Lucro</div><div class="metric-val">${fmtM(lucro)}</div></div>
      <div class="metric"><div class="metric-label">Disciplina</div><div class="metric-val">${total ? ((disc / total) * 100).toFixed(0) : 0}%</div></div>
    `;
  }

  /* META VS STOP */
  if (chartMS) chartMS.destroy();

  const ctx1 = document.getElementById('chart-ms');
  if (ctx1) {
    chartMS = new Chart(ctx1, {
      type: 'doughnut',
      data: {
        labels: ['Meta', 'Stop'],
        datasets: [{ data: [metas, total - metas] }]
      }
    });
  }

  /* LUCRO */
  if (chartLucro) chartLucro.destroy();

  const ctx2 = document.getElementById('chart-lucro');
  if (ctx2) {
    let acc = 0;
    const sorted = [...sessoes].sort((a, b) => a.data > b.data ? 1 : -1);

    chartLucro = new Chart(ctx2, {
      type: 'line',
      data: {
        labels: sorted.map(s => fmtD(s.data)),
        datasets: [{
          data: sorted.map(s => acc += s.lucro),
          fill: true,
          tension: 0.3
        }]
      }
    });
  }

  /* DISCIPLINA */
  if (chartDisc) chartDisc.destroy();

  const ctx3 = document.getElementById('chart-disc');
  if (ctx3) {
    chartDisc = new Chart(ctx3, {
      type: 'doughnut',
      data: {
        labels: ['Ok', 'Erro'],
        datasets: [{ data: [disc, total - disc] }]
      }
    });
  }
}

/* =========================
   HISTÓRICO
========================= */
function renderHistorico() {
  const el = document.getElementById('tabela-historico');
  if (!el) return;

  let html = `<table><thead><tr>
    <th>Data</th>
    <th>Lucro</th>
    <th>Resultado</th>
    <th>Ações</th>
  </tr></thead><tbody>`;

  sessoes.forEach(s => {
    html += `
      <tr>
        <td>${fmtD(s.data)}</td>
        <td>${fmtM(s.lucro)}</td>
        <td>${s.resultado}</td>
        <td><button onclick="deletar(${s.id})">X</button></td>
      </tr>
    `;
  });

  html += `</tbody></table>`;
  el.innerHTML = html;
}

/* =========================
   DELETE
========================= */
function deletar(id) {
  sessoes = sessoes.filter(s => s.id !== id);
  salvarStorage();
  atualizarContador();
  renderDashboard();
  renderHistorico();
}

/* =========================
   INIT SEGURO (SEM TELA BRANCA)
========================= */
window.addEventListener('DOMContentLoaded', () => {
  try {
    carregarStorage();

    const inp = document.getElementById('inp-data');
    if (inp) {
      inp.value = new Date().toISOString().split('T')[0];
    }

    atualizarContador();
    renderDashboard();
    renderHistorico();

  } catch (e) {
    console.error('Erro init:', e);
  }
});
</script>
