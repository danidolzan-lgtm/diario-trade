<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diário de Trade</title>

<style>
:root{
  --bg1:#070b14;
  --bg2:#0f172a;
  --card:rgba(17,26,46,0.75);
  --border:rgba(255,255,255,0.06);
  --text:#e5e7eb;
  --muted:rgba(229,231,235,0.6);
  --green:#22c55e;
  --red:#ef4444;
  --blue:#60a5fa;
  --radius:14px;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:Arial;
  background:radial-gradient(circle at top,var(--bg2),var(--bg1));
  color:var(--text);
  padding:20px;
}

/* TABS */
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin:20px 0;}
.tab{
  padding:10px 16px;
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
}
.tab.active{color:white;border-bottom:2px solid var(--blue);}
.tab:hover{color:white;}

/* SECTIONS */
.section{display:none;}
.section.active{display:block;}

/* CARDS */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:15px;
  margin-bottom:15px;
}

/* INPUTS */
input,select,textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:white;
}

/* BUTTONS */
button{
  cursor:pointer;
}

.btn{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:white;
}

.btn-primary{
  background:linear-gradient(135deg,var(--green),#16a34a);
  border:none;
}

.btn-red{
  border:1px solid var(--red);
  color:var(--red);
}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{padding:8px;border-bottom:1px solid var(--border);}

/* METRICS */
.metric{
  background:rgba(255,255,255,0.03);
  padding:12px;
  border-radius:10px;
}

/* HIDDEN */
.hidden{display:none;}
</style>
</head>

<body>

<h2>📊 Diário de Trade</h2>

<div class="tabs">
  <button class="tab active" onclick="switchTab('registrar')">Registrar</button>
  <button class="tab" onclick="switchTab('dashboard')">Dashboard</button>
  <button class="tab" onclick="switchTab('historico')">Histórico</button>
</div>

<!-- REGISTRAR -->
<div id="registrar" class="section active">
  <div class="card">
    <h3>Nova Sessão</h3>

    <label>Data</label>
    <input type="date" id="data">

    <label>Lucro</label>
    <input type="number" id="lucro">

    <label>Resultado</label>
    <select id="resultado">
      <option value="meta">Meta</option>
      <option value="stop">Stop</option>
    </select>

    <br><br>

    <button class="btn btn-primary" onclick="salvar()">Salvar</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
  <div class="card">
    <h3>Total de sessões</h3>
    <div id="total">0</div>
  </div>

  <div class="card">
    <h3>Lucro total</h3>
    <div id="lucroTotal">R$ 0</div>
  </div>
</div>

<!-- HISTÓRICO -->
<div id="historico" class="section">
  <div class="card">
    <h3>Histórico</h3>
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Lucro</th>
          <th>Resultado</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>
</div>

<script>
let sessoes = [];

/* TAB */
function switchTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(tab).classList.add('active');

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');

  if(tab==='dashboard') renderDash();
  if(tab==='historico') renderHist();
}

/* SALVAR */
function salvar(){
  const s = {
    data: document.getElementById('data').value,
    lucro: parseFloat(document.getElementById('lucro').value)||0,
    resultado: document.getElementById('resultado').value
  };

  sessoes.unshift(s);
  localStorage.setItem('sessoes', JSON.stringify(sessoes));

  alert("Salvo!");
  renderDash();
}

/* DASH */
function renderDash(){
  document.getElementById('total').innerText = sessoes.length;

  const lucro = sessoes.reduce((a,b)=>a+b.lucro,0);
  document.getElementById('lucroTotal').innerText = "R$ " + lucro.toFixed(2);
}

/* HIST */
function renderHist(){
  let html = "";
  sessoes.forEach(s=>{
    html += `<tr>
      <td>${s.data}</td>
      <td>${s.lucro}</td>
      <td>${s.resultado}</td>
    </tr>`;
  });
  document.getElementById('lista').innerHTML = html;
}

/* INIT */
window.onload = ()=>{
  sessoes = JSON.parse(localStorage.getItem('sessoes')) || [];
  renderDash();
};
</script>

</body>
</html>
