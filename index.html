<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diário de Trade</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111a2e;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#60a5fa;
  --radius:14px;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  padding:20px;
}

/* TABS */
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin:15px 0;}
.tab{
  padding:10px 14px;
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
}
.tab.active{color:white;border-bottom:2px solid var(--blue);}

.section{display:none;}
.section.active{display:block;}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:12px;
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0f172a;
  color:white;
}

/* BUTTON */
button{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.btn{
  background:#1f2937;
  color:white;
}

.btn-primary{
  background:linear-gradient(135deg,var(--green),#16a34a);
}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{padding:8px;border-bottom:1px solid var(--border);}

/* METRIC */
.metric{
  background:#0f172a;
  padding:12px;
  border-radius:10px;
}

/* COLORS */
.pos{color:var(--green);}
.neg{color:var(--red);}

canvas{height:220px !important;}
</style>
</head>

<body>

<h2>📊 Diário de Trade PRO</h2>

<div class="tabs">
  <button class="tab active" onclick="switchTab('reg')">Registrar</button>
  <button class="tab" onclick="switchTab('dash')">Dashboard</button>
  <button class="tab" onclick="switchTab('hist')">Histórico</button>
</div>

<!-- REG -->
<div id="reg" class="section active">
  <div class="card">
    <h3>Nova sessão</h3>

    <label>Data</label>
    <input type="date" id="data">

    <label>Lucro</label>
    <input type="number" id="lucro">

    <label>Resultado</label>
    <select id="resultado">
      <option value="meta">Meta</option>
      <option value="stop">Stop</option>
    </select>

    <label>Disciplina</label>
    <select id="disc">
      <option value="ok">Ok</option>
      <option value="erro">Erro</option>
    </select>

    <button class="btn-primary" onclick="save()">Salvar</button>
  </div>
</div>

<!-- DASH -->
<div id="dash" class="section">
  <div class="grid">
    <div class="metric">Total: <span id="total">0</span></div>
    <div class="metric">Lucro: <span id="profit">0</span></div>
    <div class="metric">Meta %: <span id="meta">0</span></div>
    <div class="metric">Disciplina: <span id="disciplina">0</span></div>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- HIST -->
<div id="hist" class="section">
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Lucro</th>
          <th>Resultado</th>
          <th>Disciplina</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>
</div>

<script>
let sessoes = [];
let chart;

/* TAB */
function switchTab(t){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(t).classList.add('active');

  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');

  if(t==='dash') renderDash();
  if(t==='hist') renderHist();
}

/* SAVE */
function save(){
  const s = {
    data: data.value,
    lucro: parseFloat(lucro.value)||0,
    resultado: resultado.value,
    disc: disc.value
  };

  sessoes.unshift(s);
  localStorage.setItem("trade", JSON.stringify(sessoes));

  renderDash();
}

/* DASH */
function renderDash(){
  const total = sessoes.length;
  const lucroTotal = sessoes.reduce((a,b)=>a+b.lucro,0);
  const meta = sessoes.filter(s=>s.resultado==='meta').length;
  const disc = sessoes.filter(s=>s.disc==='ok').length;

  totalEl.innerText = total;
  profit.innerText = "R$ "+lucroTotal.toFixed(2);
  metaEl.innerText = total?((meta/total)*100).toFixed(1):0;
  disciplina.innerText = total?((disc/total)*100).toFixed(1):0;

  const labels = sessoes.map(s=>s.data);
  const dataChart = sessoes.map(s=>s.lucro);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'),{
    type:'line',
    data:{
      labels,
      datasets:[{
        label:'Lucro',
        data:dataChart,
        borderColor:'#60a5fa',
        fill:true
      }]
    }
  });
}

/* HIST */
function renderHist(){
  list.innerHTML = sessoes.map(s=>`
    <tr>
      <td>${s.data}</td>
      <td class="${s.lucro>=0?'pos':'neg'}">${s.lucro}</td>
      <td>${s.resultado}</td>
      <td>${s.disc}</td>
    </tr>
  `).join('');
}

/* INIT */
window.onload=()=>{
  sessoes = JSON.parse(localStorage.getItem("trade"))||[];
  renderDash();
};
</script>

</body>
</html>
