<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#60a5fa;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:20px;
  display:flex;
  justify-content:space-between;
}

.tabs{
  display:flex;
  gap:10px;
  padding:0 20px;
}

.tab{
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  padding:10px;
  border-bottom:2px solid transparent;
}

.tab.active{
  color:white;
  border-bottom:2px solid var(--blue);
}

.section{display:none;padding:20px;}
.section.active{display:block;}

.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input,select{
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:white;
}

button{
  padding:10px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn{
  background:var(--blue);
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.small{
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<header>
  <h2>📊 Trading Journal Pro</h2>
</header>

<div class="tabs">
  <button class="tab active" onclick="tab('reg',event)">Registrar</button>
  <button class="tab" onclick="tab('dash',event)">Dashboard</button>
  <button class="tab" onclick="tab('hist',event)">Histórico</button>
</div>

<!-- REG -->
<div id="reg" class="section active">
  <div class="card">

    <div class="grid">
      <div>
        <div class="small">Data</div>
        <input type="date" id="data">
      </div>

      <div>
        <div class="small">Lucro</div>
        <input type="number" id="lucro">
      </div>

      <div>
        <div class="small">Resultado</div>
        <select id="resultado">
          <option value="meta">Meta</option>
          <option value="stop">Stop</option>
        </select>
      </div>
    </div>

    <hr style="margin:15px 0;opacity:0.2">

    <div class="grid">
      <div>
        <div class="small">OP 1 Nome</div>
        <input id="op1nome" placeholder="Ex: Tendência M1">
      </div>

      <div>
        <div class="small">OP 1</div>
        <select id="op1res">
          <option value="win">Win</option>
          <option value="loss">Loss</option>
        </select>
      </div>

      <div>
        <div class="small">Valor OP1</div>
        <input id="op1val" type="number">
      </div>
    </div>

    <br>

    <div class="grid">
      <div>
        <div class="small">OP 2 Nome (opcional)</div>
        <input id="op2nome" placeholder="Pode deixar vazio">
      </div>

      <div>
        <div class="small">OP 2</div>
        <select id="op2res">
          <option value="win">Win</option>
          <option value="loss">Loss</option>
        </select>
      </div>

      <div>
        <div class="small">Valor OP2</div>
        <input id="op2val" type="number">
      </div>
    </div>

    <br>

    <button class="btn" onclick="add()">Salvar trade</button>
  </div>
</div>

<!-- DASH -->
<div id="dash" class="section">
  <div class="card">
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- HIST -->
<div id="hist" class="section">
  <div class="card">
    <table width="100%">
      <thead>
        <tr>
          <th>Data</th>
          <th>Lucro</th>
          <th>OP1</th>
          <th>OP2</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("trades")||"[]");

function save(){
  localStorage.setItem("trades",JSON.stringify(data));
}

function add(){

  let item = {
    data:document.getElementById("data").value,
    lucro:parseFloat(document.getElementById("lucro").value||0),
    resultado:document.getElementById("resultado").value,

    op1:{
      nome:document.getElementById("op1nome").value,
      res:document.getElementById("op1res").value,
      val:document.getElementById("op1val").value
    },

    op2:{
      nome:document.getElementById("op2nome").value,
      res:document.getElementById("op2res").value,
      val:document.getElementById("op2val").value
    }
  };

  data.unshift(item);
  save();
  render();
}

function tab(id,e){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");

  if(id==="dash") draw();
  if(id==="hist") renderTable();
}

function renderTable(){
  let html="";
  data.forEach((d,i)=>{
    html+=`
      <tr>
        <td>${d.data}</td>
        <td>${d.lucro}</td>
        <td>${d.op1.nome} (${d.op1.res})</td>
        <td>${d.op2.nome || "-"}</td>
        <td><button onclick="del(${i})">X</button></td>
      </tr>
    `;
  });
  document.getElementById("table").innerHTML=html;
}

function del(i){
  data.splice(i,1);
  save();
  render();
}

function draw(){
  let ctx=document.getElementById("chart");

  let labels=data.map(d=>d.data);
  let values=data.map(d=>d.lucro);

  new Chart(ctx,{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"Lucro",
        data:values,
        borderColor:"#60a5fa"
      }]
    }
  });
}

function render(){
  renderTable();
}
render();
</script>

</body>
</html>
